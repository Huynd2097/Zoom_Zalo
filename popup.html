<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hẹn giờ Zoom -> Zalo</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --ink: #1f2a37;
      --muted: #5b6b7d;
      --primary: #1d4ed8;
      --primary-hover: #1e40af;
      --danger: #dc2626;
      --danger-hover: #b91c1c;
      --border: #dbe3ee;
    }

    body {
      margin: 0;
      padding: 14px;
      width: 340px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.08);
      padding: 14px;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .desc {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .field { flex: 1; }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #334155;
      font-weight: 600;
    }

    input, button {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      font-size: 14px;
    }

    input {
      border: 1px solid #cfd8e3;
      padding: 9px 10px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: #7aa2ff;
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.15);
    }

    button {
      border: 0;
      color: #fff;
      cursor: pointer;
      padding: 10px;
      font-weight: 700;
      margin-top: 12px;
    }

    #startBtn { background: var(--primary); }
    #startBtn:hover { background: var(--primary-hover); }
    #cancelBtn { background: var(--danger); }
    #cancelBtn:hover { background: var(--danger-hover); }

    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #2c3e50;
      min-height: 16px;
    }

    #countdown {
      margin-top: 6px;
      font-size: 12px;
      color: #0f766e;
      font-weight: 700;
      min-height: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h3>Hẹn giờ Zoom -> Zalo</h3>
    <p class="desc">Nhập sẵn nội dung trên Zalo trước. Đến giờ extension sẽ End Zoom và bấm Gửi trên Zalo.</p>

    <div class="row">
      <div class="field">
        <label for="minutes">Phút</label>
        <input id="minutes" type="number" min="0" value="0" />
      </div>
      <div class="field">
        <label for="seconds">Giây</label>
        <input id="seconds" type="number" min="0" max="59" value="30" />
      </div>
    </div>

    <button id="startBtn">Bắt đầu hẹn giờ</button>
    <button id="cancelBtn" style="display:none;">Hủy hẹn giờ</button>
    <div id="status"></div>
    <div id="countdown"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
